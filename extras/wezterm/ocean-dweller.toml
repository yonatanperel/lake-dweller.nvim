[metadata]
name = "Ocean Dweller"
origin_url = "https://github.com/yonatan-perel/lake-dweller.nvim"

[colors]
foreground = "#f0f4f8"
background = "#0a1520"

cursor_bg = "#f0f4f8"
cursor_fg = "#0a1520"
cursor_border = "#f0f4f8"

selection_bg = "#2a5070"
selection_fg = "#f0f4f8"

scrollbar_thumb = "#6090b0"
split = "#6090b0"

ansi = [
  "#0a1520",  # 0 black
  "#ff9090",  # 1 red
  "#60d8b0",  # 2 green
  "#f0d080",  # 3 yellow
  "#90c8ff",  # 4 blue
  "#ff90c0",  # 5 magenta
  "#40e0d0",  # 6 cyan
  "#f0f4f8",  # 7 white
]

brights = [
  "#6090b0",  # 8 bright black
  "#ff9090",  # 9 bright red
  "#60d8b0",  # 10 bright green
  "#f0d080",  # 11 bright yellow
  "#90c8ff",  # 12 bright blue
  "#ff90c0",  # 13 bright magenta
  "#50d0e0",  # 14 bright cyan
  "#f0f4f8",  # 15 bright white
]

[colors.tab_bar]
background = "#152535"

[colors.tab_bar.active_tab]
bg_color = "#1a3045"
fg_color = "#f0f4f8"
intensity = "Bold"

[colors.tab_bar.inactive_tab]
bg_color = "#152535"
fg_color = "#6090b0"

[colors.tab_bar.inactive_tab_hover]
bg_color = "#152535"
fg_color = "#f0f4f8"
italic = true

[colors.tab_bar.new_tab]
bg_color = "#152535"
fg_color = "#6090b0"

[colors.tab_bar.new_tab_hover]
bg_color = "#152535"
fg_color = "#f0f4f8"
italic = true
